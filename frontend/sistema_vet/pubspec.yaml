name: sistema_vet
description: "VetBook - Sistema Veterinário Completo"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP e autenticação
  http: ^1.2.1
  shared_preferences: ^2.3.2

  # UI
  flutter_tabler_icons: ^1.43.0
  google_fonts: ^6.2.1

  # Data/hora
  intl: ^0.19.0

  # Imagem
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/fundoFolhas.jpg
    - assets/VetBook1.png
    - assets/VetBook2.png
